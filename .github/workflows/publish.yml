name: Build and Publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: 'What to publish'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - packages
          - apps
          - docker
      tag:
        description: 'npm tag (latest, next, beta, alpha)'
        required: false
        default: 'latest'
        type: string
      dry-run:
        description: 'Dry run (no actual publish)'
        required: false
        default: false
        type: boolean
      force-publish:
        description: 'Force publish even if version already exists (uses --tolerate-republish)'
        required: false
        default: true
        type: boolean

env:
  NPM_TAG: ${{ inputs.tag || 'latest' }}
  DRY_RUN: ${{ inputs.dry-run == true && '--dry-run' || '' }}
  FORCE_PUBLISH: ${{ (inputs.force-publish == true || github.event_name == 'release') && '--tolerate-republish' || '' }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build all packages and apps
        run: bun run build

      - name: Sync versions from root package.json
        run: bun scripts/version-sync.ts

      - name: Resolve workspace dependencies
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Resolving workspace:* → ^$VERSION"

          for pkg in packages/core/package.json apps/*/package.json; do
            if grep -q '"workspace:\*"' "$pkg"; then
              sed -i "s|\"workspace:\*\"|\"^$VERSION\"|g" "$pkg"
              echo "  ✓ Resolved in $pkg"
            fi
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            packages/shared/dist
            packages/shared/package.json
            packages/core/dist
            packages/core/prisma
            packages/core/package.json
            apps/tools-api/dist
            apps/tools-api/package.json
            apps/mcp-client/dist
            apps/mcp-client/package.json
            apps/opencode-plugin/dist
            apps/opencode-plugin/package.json
          retention-days: 1

  publish-packages:
    needs: build
    runs-on: ubuntu-latest
    environment: DEPLOY
    if: >-
      github.event_name == 'release' ||
      inputs.target == 'all' ||
      inputs.target == 'packages'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Publish @th0th-ai/shared
        working-directory: packages/shared
        run: bun publish --access public --tag ${{ env.NPM_TAG }} ${{ env.FORCE_PUBLISH }} ${{ env.DRY_RUN }}
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @th0th-ai/core
        working-directory: packages/core
        run: bun publish --access public --tag ${{ env.NPM_TAG }} ${{ env.FORCE_PUBLISH }} ${{ env.DRY_RUN }}
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-apps:
    needs: [build, publish-packages]
    runs-on: ubuntu-latest
    environment: DEPLOY
    if: >-
      github.event_name == 'release' ||
      inputs.target == 'all' ||
      inputs.target == 'apps'
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Publish @th0th-ai/tools-api
        working-directory: apps/tools-api
        run: bun publish --access public --tag ${{ env.NPM_TAG }} ${{ env.FORCE_PUBLISH }} ${{ env.DRY_RUN }}
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @th0th-ai/mcp-client
        working-directory: apps/mcp-client
        run: bun publish --access public --tag ${{ env.NPM_TAG }} ${{ env.FORCE_PUBLISH }} ${{ env.DRY_RUN }}
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @th0th-ai/opencode-plugin
        working-directory: apps/opencode-plugin
        run: bun publish --access public --tag ${{ env.NPM_TAG }} ${{ env.FORCE_PUBLISH }} ${{ env.DRY_RUN }}
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-docker:
    needs: build
    runs-on: ubuntu-latest
    environment: DEPLOY
    if: >-
      github.event_name == 'release' ||
      inputs.target == 'all' ||
      inputs.target == 'apps' ||
      inputs.target == 'docker'
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Docker meta for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: s1lv4/th0th
          tags: |
            type=raw,value=api-${{ steps.version.outputs.version }}
            type=raw,value=api-latest,enable={{is_default_branch}}

      - name: Docker meta for MCP
        id: meta-mcp
        uses: docker/metadata-action@v5
        with:
          images: s1lv4/th0th
          tags: |
            type=raw,value=mcp-${{ steps.version.outputs.version }}
            type=raw,value=mcp-latest,enable={{is_default_branch}}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: api
          push: ${{ inputs.dry-run != true }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: mcp
          push: ${{ inputs.dry-run != true }}
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
